openapi: 3.1.0
info:
  title: Media Summary
  description: >
    Fetches a transcript from a given audio/video URL (resolving via YouTube
    where needed), generates a structured markdown summary, saves it locally,
    and publishes it as a public GitHub Gist.
  version: 1.0.0
  contact:
    name: cristoslc
    url: https://github.com/cristoslc/media-summary

# NOTE: This skill runs as a local Claude Code skill, not as a hosted API.
# To deploy as a real OpenAI GPT Action you would need to host an HTTP server
# that wraps the yt-dlp + summarisation logic and expose these endpoints.

paths:
  /summarize:
    post:
      operationId: summarizeMedia
      summary: Summarize a media URL
      description: >
        Given a URL to audio or video content (YouTube, Apple Podcasts, Spotify,
        conference recordings, etc.), resolves a YouTube equivalent if needed,
        downloads the transcript via yt-dlp, generates a structured summary, and
        returns the markdown text along with a public Gist URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  description: The URL of the media to summarize.
                  example: https://podcasts.apple.com/us/podcast/example/id123?i=456
      responses:
        "200":
          description: Summary generated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  slug:
                    type: string
                    description: Kebab-case filename slug derived from the title.
                  transcript_url:
                    type: string
                    format: uri
                    description: YouTube URL used to obtain the transcript.
                  gist_url:
                    type: string
                    format: uri
                    description: Public GitHub Gist URL of the published summary.
                  markdown:
                    type: string
                    description: Full markdown content of the summary.
        "404":
          description: No YouTube equivalent found for the provided URL.
        "422":
          description: Transcript unavailable or too short to summarize.
